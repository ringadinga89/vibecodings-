<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 학습 기록</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --panel-soft: #fafafa;
      --ink: #111111;
      --muted: #666666;
      --line: #d9d9d9;
      --accent: #d61f2c;
      --accent-dark: #9f101a;
      --accent-soft: #fff1f2;
      --success: #0f7a39;
      --danger: #c21f2f;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.10);
      --hero-bg: linear-gradient(135deg, #111111 0%, #1a1a1a 55%, #2a2a2a 100%);
      --hero-ink: #ffffff;
      --hero-muted: rgba(255, 255, 255, 0.78);
      --hero-accent: #ff6b74;
      --body-grad-1: rgba(214, 31, 44, 0.08);
      --body-grad-2: rgba(0, 0, 0, 0.05);
    }

    :root[data-theme="dark"] {
      --bg: #0b0b0b;
      --panel: #141414;
      --panel-soft: #1a1a1a;
      --ink: #f4f4f4;
      --muted: #b0b0b0;
      --line: #2a2a2a;
      --accent: #ff3847;
      --accent-dark: #ff9098;
      --accent-soft: rgba(255, 56, 71, 0.16);
      --success: #53d07a;
      --danger: #ff8080;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.40);
      --hero-bg: linear-gradient(135deg, #000000 0%, #090909 52%, #161616 100%);
      --hero-ink: #ffffff;
      --hero-muted: rgba(255, 255, 255, 0.72);
      --hero-accent: #ff707d;
      --body-grad-1: rgba(255, 56, 71, 0.14);
      --body-grad-2: rgba(255, 255, 255, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, var(--body-grad-1), transparent 30%),
        linear-gradient(225deg, var(--body-grad-2), transparent 24%),
        var(--bg);
      padding: 20px;
    }

    .app {
      width: min(100%, 1160px);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 30px 24px 22px;
      background: var(--hero-bg);
      color: var(--hero-ink);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hero_top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 10px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.86rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hero-accent);
    }

    .theme_switch {
      min-width: 170px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #ffffff;
      color: #111111;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .theme_switch option {
      background: #ffffff;
      color: #111111;
    }

    :root[data-theme="dark"] .theme_switch {
      background: #111111;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    :root[data-theme="dark"] .theme_switch option {
      background: #111111;
      color: #ffffff;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .description {
      margin: 12px 0 0;
      max-width: 70ch;
      color: var(--hero-muted);
      line-height: 1.6;
      font-size: 1.02rem;
    }

    .content {
      padding: 22px 24px 28px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.04);
    }

    .card_title {
      margin: 0 0 14px;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .form_grid {
      display: grid;
      gap: 12px;
    }

    .input_group {
      position: relative;
    }

    .field_label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.93rem;
      font-weight: 800;
      color: var(--muted);
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--ink);
      padding: 14px 14px;
      font: inherit;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .input_clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 0;
      background: #111111;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      opacity: 0.92;
    }

    .input_clear:hover {
      opacity: 1;
      background: var(--accent);
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(214, 31, 44, 0.12);
    }

    .button_row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .button,
    .mini_button,
    .chip {
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    .button:hover,
    .mini_button:hover,
    .chip:hover {
      transform: translateY(-1px);
    }

    .button {
      border-radius: 16px;
      padding: 13px 18px;
    }

    .button.is_loading {
      opacity: 0.75;
      pointer-events: none;
    }

    .button_primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 14px 24px rgba(214, 31, 44, 0.22);
    }

    .button_secondary {
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat_box {
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .stat_label {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .stat_value {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    .list_header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .list_meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .filter_group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border-radius: 999px;
      padding: 9px 13px;
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .chip.is_active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .log_list {
      display: grid;
      gap: 12px;
    }

    .log_item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .log_media {
      display: grid;
      gap: 12px;
      grid-template-columns: 160px minmax(0, 1fr);
      align-items: start;
    }

    .log_thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #111;
      display: block;
    }

    .log_body {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .log_item_top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .log_title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.45;
      word-break: break-word;
    }

    .log_title_secondary {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .log_status {
      flex: none;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.8rem;
      font-weight: 900;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .log_status.pending {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-color: rgba(214, 31, 44, 0.12);
    }

    .log_status.done {
      background: #f0f0f0;
      color: #111111;
      border-color: var(--line);
    }

    .log_description {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .log_actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mini_button {
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .mini_button.is_primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .mini_button.is_danger {
      background: #fff5f5;
      color: var(--danger);
      border-color: rgba(194, 31, 47, 0.14);
    }

    .empty_state {
      margin: 0;
      padding: 22px 14px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      background: var(--panel-soft);
      text-align: center;
      line-height: 1.6;
      color: var(--muted);
    }

    .viewer_overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.84);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 50;
    }

    .viewer_overlay.is_hidden {
      display: none;
    }

    .viewer_panel {
      width: min(100%, 1020px);
      background: var(--panel);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5);
    }

    .viewer_topbar {
      background: var(--ink);
      color: var(--panel);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .viewer_title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer_close {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .viewer_frame {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      background: #000;
    }

    @media (max-width: 920px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        border-radius: 20px;
      }

      .hero,
      .content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .list_header,
      .log_item_top {
        flex-direction: column;
      }

      .hero_top {
        flex-direction: column;
      }

      .theme_switch {
        width: 100%;
      }

      .log_media {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero_top">
        <div>
          <p class="eyebrow">YouTube Study Log</p>
        </div>
        <select class="theme_switch" id="theme_switch" aria-label="테마 선택">
          <option value="light">화이트 테마</option>
          <option value="dark">다크 테마</option>
        </select>
      </div>
      <h1 class="title">유튜브 학습 기록</h1>
      <p class="description">
        학습할 YouTube 영상 URL을 저장하고, 목록에서 바로 열어보세요.
        시청 완료 상태를 표시하고, 기록은 로컬 저장소에 유지됩니다.
      </p>
    </section>

    <section class="content">
      <div class="card">
        <h2 class="card_title">새 학습 기록</h2>
        <form id="entry_form" class="form_grid">
          <div>
            <label class="field_label" for="video_url">URL</label>
            <div class="input_group">
              <input class="input" id="video_url" name="video_url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
              <button class="input_clear" id="video_url_clear" type="button" aria-label="URL 지우기">x</button>
            </div>
          </div>
          <div>
            <label class="field_label" for="video_title">제목</label>
            <input class="input" id="video_title" name="video_title" type="text" placeholder="표시용 제목 또는 메모" maxlength="120" required />
          </div>
          <div>
            <label class="field_label" for="video_memo">메모</label>
            <textarea class="textarea" id="video_memo" name="video_memo" placeholder="학습 포인트를 적어두세요"></textarea>
          </div>
          <div class="button_row">
            <button class="button button_primary" type="submit">목록에 추가</button>
            <button class="button button_secondary" id="sample_button" type="button">샘플 1개 넣기</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2 class="card_title">현황</h2>
        <div class="stats">
          <div class="stat_box">
            <span class="stat_label">전체</span>
            <div class="stat_value" id="total_count">0</div>
          </div>
          <div class="stat_box">
            <span class="stat_label">미완료</span>
            <div class="stat_value" id="pending_count">0</div>
          </div>
          <div class="stat_box">
            <span class="stat_label">완료</span>
            <div class="stat_value" id="done_count">0</div>
          </div>
        </div>
      </div>
    </section>

    <section class="content" style="padding-top: 0;">
      <div class="card" style="grid-column: 1 / -1;">
        <div class="list_header">
          <div>
            <h2 class="card_title" style="margin-bottom: 4px;">학습 목록</h2>
            <p class="list_meta">URL을 클릭하면 팝업으로 영상이 바로 열립니다.</p>
          </div>
          <div class="filter_group" role="tablist" aria-label="목록 필터">
            <button class="chip is_active" type="button" data-filter="all">전체</button>
            <button class="chip" type="button" data-filter="pending">미완료</button>
            <button class="chip" type="button" data-filter="done">완료</button>
          </div>
        </div>

        <div id="log_list" class="log_list"></div>
      </div>
    </section>
  </main>

  <div class="viewer_overlay is_hidden" id="viewer_overlay" aria-hidden="true">
    <div class="viewer_panel" role="dialog" aria-modal="true" aria-label="YouTube 영상 보기">
      <div class="viewer_topbar">
        <p class="viewer_title" id="viewer_title">영상</p>
        <button class="viewer_close" id="viewer_close" type="button">닫기</button>
      </div>
      <iframe
        id="viewer_frame"
        class="viewer_frame"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "youtube_study_log_entries_v3";
    const THEME_KEY = "youtube_study_log_theme_v1";

    const entryForm = document.getElementById("entry_form");
    const videoUrlInput = document.getElementById("video_url");
    const videoUrlClearButton = document.getElementById("video_url_clear");
    const videoTitleInput = document.getElementById("video_title");
    const videoMemoInput = document.getElementById("video_memo");
    const sampleButton = document.getElementById("sample_button");
    const submitButton = entryForm.querySelector('button[type="submit"]');
    const logList = document.getElementById("log_list");
    const totalCount = document.getElementById("total_count");
    const pendingCount = document.getElementById("pending_count");
    const doneCount = document.getElementById("done_count");
    const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
    const themeSwitch = document.getElementById("theme_switch");
    const viewerOverlay = document.getElementById("viewer_overlay");
    const viewerTitle = document.getElementById("viewer_title");
    const viewerFrame = document.getElementById("viewer_frame");
    const viewerClose = document.getElementById("viewer_close");

    let entries = loadEntries();
    let activeFilter = "all";

    function createId() {
      return `yt_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function extractYouTubeId(url) {
      try {
        const parsed = new URL(url);
        const hostname = parsed.hostname.replace(/^www\./, "");

        if (hostname === "youtu.be") {
          return parsed.pathname.split("/").filter(Boolean)[0] || "";
        }

        if (hostname.endsWith("youtube.com")) {
          if (parsed.pathname === "/watch") {
            return parsed.searchParams.get("v") || "";
          }

          if (parsed.pathname.startsWith("/shorts/")) {
            return parsed.pathname.split("/")[2] || "";
          }

          if (parsed.pathname.startsWith("/embed/")) {
            return parsed.pathname.split("/")[2] || "";
          }
        }
      } catch (error) {
        return "";
      }

      return "";
    }

    function normalizeEntry(entry) {
      const videoId = entry.videoId || extractYouTubeId(entry.url || "");
      const legacyTitle = typeof entry.title === "string" ? entry.title : "";

      return {
        id: entry.id || createId(),
        url: entry.url || "",
        videoId,
        videoTitle: entry.videoTitle || legacyTitle || "YouTube 영상",
        thumbnailUrl: entry.thumbnailUrl || (videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : ""),
        memo: entry.memo || "",
        completed: Boolean(entry.completed),
        createdAt: entry.createdAt || new Date().toISOString(),
        completedAt: entry.completedAt || "",
      };
    }

    function loadEntries() {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed.map(normalizeEntry) : [];
      } catch (error) {
        return [];
      }
    }

    function saveEntries() {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function getPreferredTheme() {
      try {
        const savedTheme = window.localStorage.getItem(THEME_KEY);
        if (savedTheme === "light" || savedTheme === "dark") {
          return savedTheme;
        }
      } catch (error) {
        // ignore
      }

      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      themeSwitch.value = theme;

      try {
        window.localStorage.setItem(THEME_KEY, theme);
      } catch (error) {
        // ignore
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      const date = new Date(value);
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).format(date);
    }

    function toEmbedUrl(videoId) {
      return `https://www.youtube.com/embed/${videoId}?autoplay=1`;
    }

    function getFilteredEntries() {
      if (activeFilter === "pending") {
        return entries.filter((entry) => !entry.completed);
      }

      if (activeFilter === "done") {
        return entries.filter((entry) => entry.completed);
      }

      return entries;
    }

    function updateStats() {
      totalCount.textContent = String(entries.length);
      doneCount.textContent = String(entries.filter((entry) => entry.completed).length);
      pendingCount.textContent = String(entries.filter((entry) => !entry.completed).length);
    }

    function isDuplicateEntry(url, videoId) {
      const normalizedUrl = url.trim();
      return entries.some((entry) => {
        const entryVideoId = entry.videoId || extractYouTubeId(entry.url || "");
        return entry.url === normalizedUrl || (entryVideoId && entryVideoId === videoId);
      });
    }

    function setSubmitting(isSubmitting) {
      submitButton.classList.toggle("is_loading", isSubmitting);
      submitButton.disabled = isSubmitting;
      submitButton.textContent = isSubmitting ? "추가 중..." : "목록에 추가";
    }

    async function fetchYouTubeMetadata(url, videoId) {
      const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
      const response = await fetch(endpoint);

      if (!response.ok) {
        throw new Error("metadata fetch failed");
      }

      const data = await response.json();
      return {
        videoTitle: data.title || "YouTube 영상",
        thumbnailUrl: data.thumbnail_url || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
      };
    }

    async function addEntry({ url, title, memo }) {
      const videoId = extractYouTubeId(url);

      if (!videoId) {
        window.alert("YouTube URL만 추가할 수 있어요.");
        return;
      }

      if (isDuplicateEntry(url, videoId)) {
        window.alert("이미 저장된 링크입니다.");
        return;
      }

      setSubmitting(true);

      try {
        let metadata = {
          videoTitle: title || "YouTube 영상",
          thumbnailUrl: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
        };

        try {
          metadata = await fetchYouTubeMetadata(url, videoId);
        } catch (error) {
          // network or CORS failure: fallback to local thumbnail and typed title
        }

        entries = [
          {
            id: createId(),
            url,
            videoId,
            videoTitle: metadata.videoTitle,
            thumbnailUrl: metadata.thumbnailUrl,
            memo,
            completed: false,
            createdAt: new Date().toISOString(),
            completedAt: "",
          },
          ...entries,
        ];

        saveEntries();
        render();
      } finally {
        setSubmitting(false);
      }
    }

    function openViewer(entry) {
      const videoId = entry.videoId || extractYouTubeId(entry.url);

      if (!videoId) {
        window.alert("유효한 YouTube URL이 아닙니다.");
        return;
      }

      viewerTitle.textContent = entry.videoTitle || entry.title || "YouTube 영상";
      viewerFrame.src = toEmbedUrl(videoId);
      viewerOverlay.classList.remove("is_hidden");
      viewerOverlay.setAttribute("aria-hidden", "false");
    }

    function closeViewer() {
      viewerFrame.src = "";
      viewerOverlay.classList.add("is_hidden");
      viewerOverlay.setAttribute("aria-hidden", "true");
    }

    function toggleCompleted(id) {
      entries = entries.map((entry) => (
        entry.id === id
          ? {
              ...entry,
              completed: !entry.completed,
              completedAt: !entry.completed ? new Date().toISOString() : "",
            }
          : entry
      ));
      saveEntries();
      render();
    }

    function removeEntry(id) {
      entries = entries.filter((entry) => entry.id !== id);
      saveEntries();
      render();
    }

    function render() {
      updateStats();

      const filteredEntries = getFilteredEntries();
      logList.innerHTML = "";

      if (filteredEntries.length === 0) {
        logList.innerHTML = `
          <p class="empty_state">
            아직 기록이 없습니다.<br />
            왼쪽 폼에 URL을 넣고 첫 학습 영상을 추가해보세요.
          </p>
        `;
        return;
      }

      filteredEntries.forEach((entry) => {
        const item = document.createElement("article");
        item.className = "log_item";
        item.innerHTML = `
          <div class="log_media">
            <img class="log_thumbnail" src="${escapeHtml(entry.thumbnailUrl || "")}" alt="${escapeHtml(entry.videoTitle || "YouTube 썸네일")}" loading="lazy" />
            <div class="log_body">
              <div class="log_item_top">
                <div>
                  <h3 class="log_title">${escapeHtml(entry.videoTitle || entry.title || "YouTube 영상")}</h3>
                  <p class="log_title_secondary">${escapeHtml(entry.url)}</p>
                </div>
                <div class="log_status ${entry.completed ? "done" : "pending"}">
                  ${entry.completed ? "완료" : "미완료"}
                </div>
              </div>
              <p class="log_description">${escapeHtml(entry.memo || "")}</p>
            </div>
          </div>
          <div class="log_actions">
            <button class="mini_button is_primary" type="button" data-action="open">열기</button>
            <button class="mini_button" type="button" data-action="toggle">${entry.completed ? "미완료" : "완료"}</button>
            <button class="mini_button is_danger" type="button" data-action="remove">삭제</button>
            <button class="mini_button" type="button" data-action="copy">URL 복사</button>
          </div>
          <div class="log_description" style="font-size: 0.85rem;">
            등록: ${formatDate(entry.createdAt)}
            ${entry.completedAt ? ` · 완료: ${formatDate(entry.completedAt)}` : ""}
          </div>
        `;

        item.querySelector('[data-action="open"]').addEventListener("click", () => openViewer(entry));
        item.querySelector('[data-action="toggle"]').addEventListener("click", () => toggleCompleted(entry.id));
        item.querySelector('[data-action="remove"]').addEventListener("click", () => {
          if (window.confirm("이 기록을 삭제할까요?")) {
            removeEntry(entry.id);
          }
        });
        item.querySelector('[data-action="copy"]').addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(entry.url);
          } catch (error) {
            window.prompt("복사할 URL", entry.url);
          }
        });

        logList.appendChild(item);
      });
    }

    entryForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const url = videoUrlInput.value.trim();
      const title = videoTitleInput.value.trim();
      const memo = videoMemoInput.value.trim();

      if (!url || !title) {
        window.alert("URL과 제목을 모두 입력해주세요.");
        return;
      }

      addEntry({ url, title, memo })
        .then(() => {
          entryForm.reset();
          videoUrlInput.focus();
        })
        .finally(() => {
          setSubmitting(false);
        });
    });

    sampleButton.addEventListener("click", () => {
      addEntry({
        url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        title: "샘플 학습 영상",
        memo: "YouTube 기록 기능 테스트용 샘플입니다.",
      }).finally(() => {
        setSubmitting(false);
      });
    });

    videoUrlClearButton.addEventListener("click", () => {
      videoUrlInput.value = "";
      videoUrlInput.focus();
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter || "all";
        filterButtons.forEach((item) => item.classList.toggle("is_active", item === button));
        render();
      });
    });

    themeSwitch.addEventListener("change", () => {
      applyTheme(themeSwitch.value);
    });

    viewerClose.addEventListener("click", closeViewer);
    viewerOverlay.addEventListener("click", (event) => {
      if (event.target === viewerOverlay) {
        closeViewer();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !viewerOverlay.classList.contains("is_hidden")) {
        closeViewer();
      }
    });

    applyTheme(getPreferredTheme());
    render();
  </script>
</body>
</html>
