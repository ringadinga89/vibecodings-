<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모험 퍼즐 게임</title>
  <style>
    :root {
      --bg-1: #f0f6ff;
      --bg-2: #fef9f2;
      --panel: rgba(255, 255, 255, 0.92);
      --ink: #1f2a44;
      --muted: #66708a;
      --accent: #4b6cff;
      --success: #1f7a3f;
      --danger: #c53b3b;
      --card-front: #bdf1d0;
      --card-back: #effff5;
      --card-border: rgba(110, 203, 136, 0.45);
      --shadow: 0 24px 70px rgba(62, 89, 145, 0.16);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(75, 108, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 122, 89, 0.16), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 980px);
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 28px 24px 20px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: auto -120px -160px auto;
      width: 320px;
      height: 320px;
      pointer-events: none;
      background: radial-gradient(circle, rgba(75, 108, 255, 0.18), transparent 65%);
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 12px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.5;
    }

    .toolbar {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: end;
      justify-content: space-between;
    }

    .control_group {
      display: grid;
      gap: 8px;
    }

    .control_label {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .level_select {
      min-width: 190px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(75, 108, 255, 0.16);
      background: #fff;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(62, 89, 145, 0.08);
      outline: none;
    }

    .stats {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
      justify-content: center;
    }

    .stat {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .stat_value {
      color: var(--accent);
    }

    .restart_button,
    .overlay_button {
      border: 0;
      border-radius: 16px;
      padding: 14px 22px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(75, 108, 255, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .restart_button:hover,
    .overlay_button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(75, 108, 255, 0.3);
    }

    .restart_button:active,
    .overlay_button:active {
      transform: translateY(1px);
    }

    .overlay_button.secondary {
      background: #eff3ff;
      color: var(--ink);
      box-shadow: none;
      border: 1px solid rgba(75, 108, 255, 0.12);
    }

    .board {
      margin-top: 18px;
      display: grid;
      gap: 10px;
      transition: opacity 0.2s ease, filter 0.2s ease;
    }

    .board.is_locked {
      opacity: 0.35;
      filter: blur(1px);
      pointer-events: none;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      border: 1px solid var(--card-border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0)),
        var(--card-front);
      color: transparent;
      display: grid;
      place-items: center;
      font-size: clamp(1.1rem, 2vw, 2rem);
      cursor: pointer;
      user-select: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.18s ease, color 0.18s ease, filter 0.18s ease, background-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
    }

    .card.flipped {
      background: var(--card-back);
      color: #e09500;
      transform: rotateY(180deg);
    }

    .card.matched {
      color: #d08d00;
      background: linear-gradient(180deg, rgba(206, 255, 218, 0.98), rgba(178, 239, 194, 0.92));
      border-color: rgba(102, 196, 127, 0.45);
      cursor: default;
      opacity: 0.95;
    }

    .message {
      margin: 18px 0 0;
      min-height: 1.6em;
      text-align: center;
      font-size: 1.02rem;
      font-weight: 800;
      color: var(--success);
    }

    .message.is_idle {
      color: var(--muted);
      font-weight: 600;
    }

    .message.is_game_over {
      color: var(--danger);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(247, 248, 255, 0.9);
      backdrop-filter: blur(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .overlay.is_hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
    }

    .overlay_card {
      width: min(100%, 560px);
      border-radius: 28px;
      padding: 30px 26px 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 24px 60px rgba(62, 89, 145, 0.16);
    }

    .overlay_kicker {
      margin: 0;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .overlay_title {
      margin: 10px 0 0;
      font-size: clamp(1.9rem, 4.4vw, 2.9rem);
      line-height: 1.08;
      letter-spacing: -0.05em;
    }

    .overlay_text {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.6;
    }

    .overlay_actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .overlay_button.is_hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .toolbar {
        justify-content: center;
      }

      .control_group,
      .stats {
        width: 100%;
      }

      .stats {
        order: 3;
      }

      .level_select,
      .restart_button {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 22px 16px 18px;
        border-radius: 22px;
      }

      .overlay_card {
        padding: 24px 18px 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">모험 퍼즐 게임</h1>
    <p class="subtitle">
      시작 버튼을 누르면 쉬움부터 출발합니다. 레벨을 클리어할 때마다 더 큰 보드로 자동 이동해요.
    </p>

    <div class="toolbar">
      <div class="control_group">
        <label class="control_label" for="level_select">현재 난이도</label>
        <select class="level_select" id="level_select" disabled>
          <option value="easy">쉬움 (2x2)</option>
          <option value="medium1">중간1 (4x4)</option>
          <option value="medium2">중간2 (6x6)</option>
          <option value="medium3">중간3 (8x8)</option>
          <option value="hard">어려움 (10x10)</option>
        </select>
      </div>

      <div class="stats">
        <p class="stat">시도 횟수: <span class="stat_value" id="attempt_count">0</span></p>
        <p class="stat">남은 시간: <span class="stat_value" id="time_left">0:00</span></p>
      </div>

      <button class="restart_button" id="restart_button" type="button">다시 시작</button>
    </div>

    <section class="board" id="board" aria-label="퍼즐 카드 보드"></section>
    <p class="message is_idle" id="message">시작 버튼을 눌러 게임을 시작하세요.</p>

    <div class="overlay" id="overlay">
      <div class="overlay_card">
        <p class="overlay_kicker" id="overlay_kicker">Game Start</p>
        <h2 class="overlay_title" id="overlay_title">퍼즐을 시작해볼까요?</h2>
        <p class="overlay_text" id="overlay_text">
          시작하기를 누르면 쉬움 난이도부터 시작합니다.
          각 레벨은 제한 시간 안에 모두 맞춰야 하며, 클리어하면 다음 단계로 자동 이동합니다.
        </p>
        <div class="overlay_actions">
          <button class="overlay_button" id="overlay_primary_button" type="button">시작하기</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const levelConfigs = {
      easy: { label: "쉬움", size: 2, timeLimit: 20 },
      medium1: { label: "중간1", size: 4, timeLimit: 65 },
      medium2: { label: "중간2", size: 6, timeLimit: 120 },
      medium3: { label: "중간3", size: 8, timeLimit: 190 },
      hard: { label: "어려움", size: 10, timeLimit: 280 },
    };

    const levelOrder = ["easy", "medium1", "medium2", "medium3", "hard"];

    const iconPool = [
      "🍓", "🍑", "🥝", "🍊", "🍎", "🍉", "🍌", "🫐", "🍐", "🍍",
      "🍒", "🍇", "🥥", "🍋", "🥑", "🍈", "🍅", "🌽", "🥕", "🧄",
      "🥦", "🌶️", "🥔", "🍄", "🥨", "🧀", "🍩", "🍪", "🍰", "🧁",
      "🍫", "🍿", "🍔", "🍟", "🍕", "🌮", "🌯", "🥞", "🍙", "🍘",
      "🍥", "🍢", "🍡", "🍧", "🍨", "🥤", "🧋", "☕", "🫖", "🍺"
    ];

    const boardElement = document.getElementById("board");
    const attemptCountElement = document.getElementById("attempt_count");
    const timeLeftElement = document.getElementById("time_left");
    const messageElement = document.getElementById("message");
    const overlayElement = document.getElementById("overlay");
    const overlayKickerElement = document.getElementById("overlay_kicker");
    const overlayTitleElement = document.getElementById("overlay_title");
    const overlayTextElement = document.getElementById("overlay_text");
    const overlayPrimaryButton = document.getElementById("overlay_primary_button");
    const levelSelect = document.getElementById("level_select");
    const restartButton = document.getElementById("restart_button");

    let currentLevel = "easy";
    let gamePhase = "ready";
    let attemptCount = 0;
    let matchedPairs = 0;
    let timeLeft = 0;
    let firstCard = null;
    let secondCard = null;
    let boardLocked = true;
    let countdownTimer = null;
    let pendingHideTimer = null;
    let stageAdvanceTimer = null;
    let currentCards = [];

    function shuffle(array) {
      const copy = [...array];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const rest = seconds % 60;
      return `${minutes}:${String(rest).padStart(2, "0")}`;
    }

    function getCurrentConfig() {
      return levelConfigs[currentLevel];
    }

    function pairCountFor(size) {
      return (size * size) / 2;
    }

    function updateStats() {
      attemptCountElement.textContent = String(attemptCount);
      timeLeftElement.textContent = formatTime(timeLeft);
      levelSelect.value = currentLevel;
    }

    function setMessage(text, tone = "idle") {
      messageElement.textContent = text;
      messageElement.classList.toggle("is_idle", tone === "idle");
      messageElement.classList.toggle("is_game_over", tone === "game_over");
    }

    function showOverlay({ kicker, title, text, buttonText, buttonClass = "", showButton = true }) {
      overlayKickerElement.textContent = kicker;
      overlayTitleElement.textContent = title;
      overlayTextElement.textContent = text;
      overlayPrimaryButton.textContent = buttonText;
      overlayPrimaryButton.className = `overlay_button${buttonClass ? ` ${buttonClass}` : ""}`;
      overlayPrimaryButton.classList.toggle("is_hidden", !showButton);
      overlayElement.classList.remove("is_hidden");
    }

    function hideOverlay() {
      overlayElement.classList.add("is_hidden");
    }

    function setBoardLocked(isLocked) {
      boardLocked = isLocked;
      boardElement.classList.toggle("is_locked", isLocked);
    }

    function stopCountdown() {
      if (countdownTimer !== null) {
        window.clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    function stopPendingHide() {
      if (pendingHideTimer !== null) {
        window.clearTimeout(pendingHideTimer);
        pendingHideTimer = null;
      }
    }

    function stopStageAdvance() {
      if (stageAdvanceTimer !== null) {
        window.clearTimeout(stageAdvanceTimer);
        stageAdvanceTimer = null;
      }
    }

    function generateCards() {
      const { size } = getCurrentConfig();
      const count = pairCountFor(size);
      const icons = shuffle(iconPool).slice(0, count);
      currentCards = shuffle([...icons, ...icons]);
    }

    function renderBoard() {
      const { size } = getCurrentConfig();
      boardElement.innerHTML = "";
      boardElement.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;

      currentCards.forEach((icon) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "card";
        button.textContent = icon;
        button.dataset.icon = icon;
        button.setAttribute("aria-label", "카드");
        button.setAttribute("aria-pressed", "false");
        button.addEventListener("click", handleCardClick);
        boardElement.appendChild(button);
      });
    }

    function resetLevelState() {
      stopCountdown();
      stopPendingHide();
      stopStageAdvance();

      attemptCount = 0;
      matchedPairs = 0;
      timeLeft = getCurrentConfig().timeLimit;
      firstCard = null;
      secondCard = null;
      setBoardLocked(true);

      generateCards();
      updateStats();
      renderBoard();
    }

    function startCountdown() {
      stopCountdown();
      countdownTimer = window.setInterval(() => {
        if (gamePhase !== "playing") {
          stopCountdown();
          return;
        }

        timeLeft -= 1;
        updateStats();

        if (timeLeft <= 0) {
          timeLeft = 0;
          updateStats();
          handleGameOver();
        }
      }, 1000);
    }

    function handleGameOver() {
      if (gamePhase !== "playing") {
        return;
      }

      gamePhase = "game_over";
      setBoardLocked(true);
      stopCountdown();
      stopPendingHide();
      stopStageAdvance();

      boardElement.querySelectorAll(".card").forEach((card) => {
        card.disabled = true;
      });

      setMessage("시간 초과! 게임 오버입니다.", "game_over");
      showOverlay({
        kicker: "Game Over",
        title: "시간이 모두 소진됐어요",
        text: "아쉽지만 이번 도전은 여기서 끝났습니다. 시작 화면으로 돌아가 다시 도전해보세요.",
        buttonText: "시작 화면으로",
        buttonClass: "secondary",
      });
    }

    function advanceToNextLevel() {
      const currentIndex = levelOrder.indexOf(currentLevel);
      const lastLevel = currentIndex === levelOrder.length - 1;

      stopCountdown();
      stopPendingHide();
      stopStageAdvance();
      setBoardLocked(true);

      if (lastLevel) {
        gamePhase = "finished";
        setMessage(`축하합니다! ${attemptCount}번 만에 모든 레벨을 완료했습니다.`, "idle");
        showOverlay({
          kicker: "Congratulations",
          title: "모든 레벨을 통과했어요",
          text: "쉬움부터 어려움까지 모두 완주했습니다. 정말 대단해요!",
          buttonText: "처음부터 다시",
          buttonClass: "secondary",
        });
        return;
      }

      const nextLevel = levelOrder[currentIndex + 1];
      gamePhase = "cleared";
      setMessage(`축하합니다! ${getCurrentConfig().label}를 완료했습니다.`, "idle");
      showOverlay({
        kicker: "Stage Clear",
        title: `${getCurrentConfig().label} 완료`,
        text: `${levelConfigs[nextLevel].label} 난이도로 곧 이동합니다.`,
        buttonText: "다음 단계로",
        buttonClass: "secondary",
        showButton: false,
      });

      stageAdvanceTimer = window.setTimeout(() => {
        currentLevel = nextLevel;
        gamePhase = "playing";
        resetLevelState();
        hideOverlay();
        setBoardLocked(false);
        setMessage("카드를 눌러 같은 그림을 찾아보세요.", "idle");
        startCountdown();
      }, 1300);
    }

    function handleCardClick(event) {
      const card = event.currentTarget;

      if (gamePhase !== "playing" || boardLocked || card.classList.contains("matched") || card === firstCard) {
        return;
      }

      card.classList.add("flipped");
      card.setAttribute("aria-pressed", "true");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      attemptCount += 1;
      updateStats();
      setBoardLocked(true);

      if (firstCard.dataset.icon === secondCard.dataset.icon) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        firstCard.disabled = true;
        secondCard.disabled = true;
        matchedPairs += 1;
        firstCard = null;
        secondCard = null;
        setBoardLocked(false);

        if (matchedPairs === pairCountFor(getCurrentConfig().size)) {
          advanceToNextLevel();
        } else {
          setMessage("잘 찾았어요! 같은 그림입니다.", "idle");
        }
        return;
      }

      setMessage("다시 시도해보세요.", "idle");
      stopPendingHide();
      pendingHideTimer = window.setTimeout(() => {
        if (firstCard) {
          firstCard.classList.remove("flipped");
          firstCard.setAttribute("aria-pressed", "false");
        }
        if (secondCard) {
          secondCard.classList.remove("flipped");
          secondCard.setAttribute("aria-pressed", "false");
        }
        firstCard = null;
        secondCard = null;
        setBoardLocked(false);
        pendingHideTimer = null;
      }, 850);
    }

    function startGame() {
      currentLevel = "easy";
      gamePhase = "playing";
      resetLevelState();
      hideOverlay();
      setBoardLocked(false);
      setMessage("카드를 눌러 같은 그림을 찾아보세요.", "idle");
      startCountdown();
    }

    function showStartScreen() {
      currentLevel = "easy";
      gamePhase = "ready";
      resetLevelState();
      setBoardLocked(true);
      setMessage("시작 버튼을 눌러 게임을 시작하세요.", "idle");
      showOverlay({
        kicker: "Game Start",
        title: "퍼즐을 시작해볼까요?",
        text: "시작하기를 누르면 쉬움 난이도부터 시작합니다. 각 레벨은 제한 시간 안에 모두 맞춰야 하며, 클리어하면 다음 단계로 자동 이동합니다.",
        buttonText: "시작하기",
      });
    }

    overlayPrimaryButton.addEventListener("click", () => {
      if (gamePhase === "ready") {
        startGame();
        return;
      }

      if (gamePhase === "game_over" || gamePhase === "finished") {
        showStartScreen();
      }
    });

    restartButton.addEventListener("click", showStartScreen);

    showStartScreen();
  </script>
</body>
</html>
